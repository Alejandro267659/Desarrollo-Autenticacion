<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Login</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#d5f5cf;
            margin:0;
        }

        .contenedor{
            width: 400px;
            margin: 120px auto;
        }

        label{
            display:block;
            margin-top:20px;
            font-size:16px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:5px;
            border-radius:20px;
            border:2px solid #7f8cd9;
            outline:none;
        }

        .btn{
            width:100%;
            margin-top:30px;
            padding:12px;
            border:none;
            border-radius:25px;
            background-color:#5cc087;
            color:#1b1b1b;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background-color:#4caf75;
        }
    </style>

</head>

<body>

<div class="contenedor">

    <form>

        <label>Username:</label>
        <input type="text" name="username"/>

        <label>Password:</label>
        <input type="password" name="password"/>

        <input type="submit" value="Login" class="btn"/>

    </form>

</div>

</body>
</html>
