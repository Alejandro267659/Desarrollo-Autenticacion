<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:c="http://java.sun.com/jsp/jstl/core">
<head>
    <title>Login</title>

    <style>

        .titulo-sistema {
            text-align: center;
            font-size: 50px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #cfd3e2;
            margin: 0;
        }

        .contenedor {
            width: 400px;
            margin: 100px auto;
        }

        label {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 20px;
            border: 2px solid #7f8cd9;
            box-sizing: border-box;
            outline: none;
        }

        .error-input {
            border: 2px solid red !important;
        }

        .btn {
            width: 100%;
            margin-top: 30px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background-color: #5cc087;
            color: #1b1b1b;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #4caf75;
        }

        .error-message {
            color: red;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="contenedor">

    <div class="titulo-sistema">SAUAP</div>

    <c:if test="${not empty error}">
        <div class="error-message">${error}</div>
    </c:if>

    <form action="LoginServlet" method="post">
        <label>Username:</label>
        <input type="text" name="username"
               class="${not empty error ? 'error-input' : ''}" />

        <label>Password:</label>
        <input type="password" name="password"
               class="${not empty error ? 'error-input' : ''}" />

        <input type="submit" value="Login" class="btn"/>
    </form>

</div>
</body>
</html>
